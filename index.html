    <title>Luiz Felipe | Portfólio ADS</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;

            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

            margin: 0 auto;
            padding: 40px 20px;
        }

        header {

            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        header p {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 500;
        }

        .about {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }

            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--text-main);
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }
